<!DOCTYPE html>
<html>
<head>
    <title>Game Technical Support</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 50px;
        }
        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 60%;
            margin: auto;
        }
        input, textarea {
            width: 80%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>
<body>

    <h1>🎮 Game Technical Support</h1>

    <div class="box">
        <h2>Submit Your Issue</h2>

        <input type="text" placeholder="Your Name"><br>
        <input type="email" placeholder="Your Email"><br>
        <textarea rows="5" placeholder="Describe your problem"></textarea><br>

        <button>Submit</button>
    </div>

    <p>© 2026 Your Game Support</p>

</body>
</html>
